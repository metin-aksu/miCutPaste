name: miCutPaste
options:
  bundleIdPrefix: com.metinaksu
  developmentLanguage: en
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    DEVELOPMENT_TEAM: Y5K2497B6G
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  miCutPaste:
    type: application
    platform: macOS
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: miCutPaste
        CFBundleLocalizations: [en, tr, ar, ca, cs, da, de, el, es, fi, fr, he, hi, hu, id, it, ja, ko, ms, nb, nl, pl, pt-BR, pt-PT, ro, ru, sk, sv, th, uk, vi, zh-Hans, zh-Hant]
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: "© 2026 Metin Aksu"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metinaksu.micutpaste
        PRODUCT_NAME: miCutPaste
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: FinderExtension
        embed: true
  FinderExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: FinderExtension
    info:
      path: FinderExtension/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: miCutPaste
        CFBundleLocalizations: [en, tr, ar, ca, cs, da, de, el, es, fi, fr, he, hi, hu, id, it, ja, ko, ms, nb, nl, pl, pt-BR, pt-PT, ro, ru, sk, sv, th, uk, vi, zh-Hans, zh-Hant]
        NSExtension:
          NSExtensionPointIdentifier: com.apple.FinderSync
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).FinderSync
    entitlements:
      path: FinderExtension/FinderExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        # Personal-use exception so the sandboxed extension can move files anywhere.
        # Not App Store compatible; replace with an XPC helper if ever distributed there.
        com.apple.security.temporary-exception.files.absolute-path.read-write:
          - /
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metinaksu.micutpaste.FinderExtension
        PRODUCT_NAME: FinderExtension
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES
